<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un quiz — Local QCM</title>
  <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/importer.css">
  <style>.upload-zone{display:none}</style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="header">
    <div class="header-inner">
      <a href="../index.html" class="header-logo">
        <img src="../assets/logo.png" alt="Local QCM">
        <span>Local QCM</span>
      </a>
      <nav class="header-nav">
        <a href="../index.html" class="btn btn-sm btn-back">Retour</a>
      </nav>
    </div>
  </header>

  <main class="page-main">

    <!-- ─── ENTETE DE PAGE ─── -->
    <div class="page-header">
      <h1>Créer un Quiz</h1>
      <p>Construisez votre quiz de zéro</p>
    </div>

    <!-- ─── METADONNEES : titre et auteur ─── -->
    <div class="editor-meta">
      <div class="input-group">
        <label for="quizTitle">Titre du quiz</label>
        <input type="text" id="quizTitle" placeholder="Ex: Data Structures - Chapitre 3">
      </div>
      <div class="input-group">
        <label for="quizAuthor">Auteur</label>
        <input type="text" id="quizAuthor" placeholder="Votre nom">
      </div>
    </div>

    <!-- ─── LISTE DES QUESTIONS ─── -->
    <div class="questions-header">
      <h2>Questions</h2>
    </div>

    <div class="questions-list" id="questionsList"></div>

    <div style="text-align:center; margin-top: 1rem;">
      <button class="btn btn-primary btn-sm" id="addQuestionBtn">+ Ajouter une question</button>
    </div>

    <!-- ─── BOUTON EXPORT ─── -->
    <div class="editor-actions">
      <button class="btn btn-primary" id="exportBtn">Exporter le JSON</button>
    </div>

  </main>

  <script src="../js/creer.js"></script>
</body>
</html>
